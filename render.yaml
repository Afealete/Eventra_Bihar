services:
  - type: web
    name: eventra-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    # Runs once per deployment before the web process starts. Do not run
    # migrations from the service start command: multiple instances could
    # otherwise race during restarts or scaling.
    preDeployCommand: npm run db:migrate
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: eventra-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        fromService:
          type: web
          name: eventra-web
          envVarKey: RENDER_EXTERNAL_URL
      # Configure private service-account fields in Render's dashboard.
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Required when web and API use custom subdomains, for example
      # .example.com. Leave unset for a same-origin deployment.
      - key: COOKIE_DOMAIN
        sync: false
      # Used only when running the explicit create-admin script.
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
  - type: web
    name: eventra-web
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        fromService:
          type: web
          name: eventra-api
          envVarKey: RENDER_EXTERNAL_URL
      # Firebase Web SDK configuration for the deployed frontend.
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
databases:
  - name: eventra-db
    databaseName: eventra
    user: eventra
